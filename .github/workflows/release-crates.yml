name: Release | Crates.io

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.88 --profile minimal --component clippy rustfmt
          rustup default 1.88

      - name: Check tag matches Cargo version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "onioncry") | .version')"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::tag v${tag_version} does not match Cargo.toml version ${cargo_version}"
            exit 1
          fi

      - name: Verify
        run: make verify

      - name: Publish dry run
        run: cargo publish --dry-run --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
